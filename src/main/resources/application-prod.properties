# Production config — Railway injects these environment variables automatically
server.port=${PORT:8080}

# Database — Railway MySQL plugin sets these automatically
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:MySecretKeyForCollegeFestBooking2026ThisShouldBeAtLeast256BitsLongForHS512Algorithm}
jwt.expiration=86400000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# Logging (less verbose in prod)
logging.level.root=WARN
logging.level.com.collegefest.booking=INFO

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
